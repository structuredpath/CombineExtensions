name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  swift-package:
    name: Swift ${{ matrix.swift-language-mode }} (Xcode ${{ matrix.xcode }})
    runs-on: macos-26

    strategy:
      matrix:
        include:
          - xcode: "26.3"
            swift-language-mode: "5"
            swift-flags: ""
          - xcode: "26.3"
            swift-language-mode: "6"
            swift-flags: "-Xswiftc -swift-version -Xswiftc 6"

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version ${{ matrix.xcode }}
        run: |
          sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app
          xcodebuild -version

      - name: Print system and architecture info
        run: |
          echo "Architecture: $(uname -m)"
          echo "Processor: $(sysctl -n machdep.cpu.brand_string 2>/dev/null || echo 'N/A')"
          echo "macOS Version: $(sw_vers -productVersion) ($(sw_vers -buildVersion))"
          echo "Xcode Path: $(xcode-select -p)"
          echo "macOS SDK: $(xcrun --sdk macosx --show-sdk-path)"

      - name: Build
        run: swift build -v ${{ matrix.swift-flags }}

      - name: Run tests
        run: swift test -v ${{ matrix.swift-flags }}
